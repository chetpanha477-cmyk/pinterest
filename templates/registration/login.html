{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="form-card">
  <h1>Log in</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-create">Log in</button>
  </form>
  <p class="muted">No account? <a href="{% url 'register' %}">Sign up</a></p>
</div>
{% endblock %}
