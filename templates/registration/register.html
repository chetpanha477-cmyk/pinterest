{% extends 'base.html' %}
{% block title %}Sign up{% endblock %}
{% block content %}
<div class="form-card">
  <h1>Create your account</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-create">Sign up</button>
  </form>
  <p class="muted">Already have an account? <a href="{% url 'login' %}">Log in</a></p>
</div>
{% endblock %}
